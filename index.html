<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LQueue</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://kit.fontawesome.com/de4851ac23.js" crossorigin="anonymous"></script>
    <style>
        /* Enkel CSS ifall style.css saknas för att sidan ska se bra ut */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        nav {
            background-color: #e4002b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }
        .notice {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .parent {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .info-icon { color: #e4002b; }
        .info-lbl { font-size: 18px; font-weight: bold; margin: 0; }
        .person-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .person-box {
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .person-box.glow {
            background: #e4002b;
            box-shadow: 0 0 10px rgba(228, 0, 43, 0.5);
        }
        .custom-btn {
            background: #333;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .custom-btn:hover { background: #555; }
        .attraction-holder {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .attraction-box {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 10px;
        }
        .attraction-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
        }
        .attraction-info {
            margin-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #title { font-weight: bold; margin: 0 0 5px 0; }
        #description { font-size: 12px; color: #666; margin: 0 0 5px 0; }
        #time { font-weight: bold; margin: 0; }
        #loading { text-align: center; color: #666; }
    </style>
</head>
<body>
    <nav>
        <p class="title">LQueue</p>
    </nav>
    <p style="font-size: 14px;" class="notice">This project is maintained by Pink Flamingo. <br> <span style="font-size: 12px;">Only for educational purposes.</span></p>
    <div class="parent">
        <div class="info-box">
            <i class="fa-solid fa-cloud-sun fa-3x info-icon"></i>
            <p class="info-lbl">+21°C</p>
        </div>
        <div class="info-box">
            <i class="fa-solid fa-clock fa-3x info-icon"></i>
            <p class="info-lbl">13-22</p>
        </div>
    </div>
    <p>How many people are in queue?</p>
    <div class="person-container">
        <div class="person-box glow">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
    </div>
    <div class="custom-btn">
        <p>Search</p>
    </div>
    <div class="attraction-holder">
    </div>
    
    <script>
    const personBoxes = Array.from(document.querySelectorAll(".person-box"));
    let queueSize = 1;

    // Hanterare för att välja antal personer
    personBoxes.forEach((box, index) => {
        box.onclick = function() {
            queueSize = index + 1;
            // Ta bort glow från alla
            personBoxes.forEach(b => b.classList.remove("glow"));
            // Lägg till glow upp till den valda
            for (let i = 0; i <= index; i++) {
                personBoxes[i].classList.add("glow");
            }
            console.log("Antal personer valda:", queueSize);
        };
    });

    // Hjälpfunktion: Formaterar tid och lägger till +2 timmar (som originalkoden)
    function formatTime(dateStr) {
        const date = new Date(dateStr);
        const adjustedDate = new Date(date.getTime() + 7200000); 
        return `${String(adjustedDate.getUTCHours()).padStart(2,"0")}:${String(adjustedDate.getUTCMinutes()).padStart(2,"0")}:${String(adjustedDate.getUTCSeconds()).padStart(2,"0")}`;
    }

    // Hjälpfunktion: Räknar ut återstående tid
    function getRemainingTime(timeStr) {
        const [h, m] = timeStr.split(":").map(Number);
        const now = new Date();
        let target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
        let diff = target - now;
        if (diff < 0) diff += 86400000; // Lägg till 24h om tiden redan passerats
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        return hours < 1 ? `${mins}min` : `${hours}h ${mins}min`;
    }

    // Hjälpfunktion: Hur många minuter sedan target-tiden?
    function getMinutesSince(timeStr) {
        const [h, m, s] = timeStr.split(":").map(Number);
        const now = new Date();
        const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, s);
        return Math.floor((now - target) / 60000);
    }

    // Sök-knappen
    $(".custom-btn").click(async function() {
        $(".attraction-holder").empty();
        $(".attraction-holder").append('<p id="loading">Hämtar data från Liseberg...</p>');

        // Använder en CORS-proxy för att kunna hämta datan från webbläsaren
        const proxy = "https://corsproxy.io/?url=";
        const attractionsUrl = proxy + encodeURIComponent("https://www.liseberg.se/sv/api/app/attractions");

        try {
            const attractions = await $.getJSON(attractionsUrl);
            let promises = [];
            let combinedData = {};

            attractions.forEach(function(attraction) {
                if (attraction.virtualQueueId) {
                    let queueUrl = proxy + encodeURIComponent("https://virtualqueue.liseberg.se/Queue/" + attraction.virtualQueueId);
                    
                    let promise = $.getJSON(queueUrl).then(function(queueData) {
                        let vqTime = null;
                        // Kolla om estimatedTimes existerar och har rätt index
                        if (queueData.estimatedTimes && queueData.estimatedTimes[queueSize - 1]) {
                            vqTime = formatTime(queueData.estimatedTimes[queueSize - 1].time);
                        }
                        
                        combinedData[attraction.virtualQueueId] = {
                            Time: vqTime,
                            queueData: queueData,
                            Data: attraction
                        };
                    }).catch(function(err) {
                        console.error("Kunde inte hämta kö för " + attraction.virtualQueueId, err);
                    });
                    
                    promises.push(promise);
                }
            });

            Promise.all(promises).then(function() {
                $("#loading").remove();
                let entries = Object.entries(combinedData);

                // Sortera efter tid (de utan tid hamnar sist)
                entries.sort(function(a, b) {
                    let timeA = a[1].Time || "99:99:99";
                    let timeB = b[1].Time || "99:99:99";
                    return timeA.localeCompare(timeB);
                });

                if (entries.length === 0) {
                    $(".attraction-holder").append('<p>Inga attraktioner med virtuella köer hittades.</p>');
                }

                entries.forEach(function(entry) {
                    let data = entry[1];
                    let timeStr = data.Time;
                    let timeHtml = '';

                    if (!timeStr) {
                        timeHtml = '<p style="color: gray;" id="time">VQ Closed</p>';
                    } else if (getMinutesSince(timeStr) >= 0) {
                        timeHtml = '<p style="color: rgb(80, 189, 76);" id="time">Now!</p>';
                    } else {
                        timeHtml = '<p id="time">' + getRemainingTime(timeStr) + '</p>';
                    }

                    // Hantera -1 i kötider
                    let minWait = data.Data.state.minWaitTime;
                    let maxWait = data.Data.state.maxWaitTime;
                    let queueText = '';
                    if (minWait === -1 || maxWait === -1 || !data.Data.state.isOpen) {
                        queueText = 'Physical queue: Closed';
                    } else {
                        queueText = 'Physical queue: ' + minWait + '-' + maxWait + ' min';
                    }

                    let elementHTML = `
                    <div class="attraction-box">
                        <div style="display: flex; flex-direction: row;">
                            <div>
                                <img class="attraction-img" src="${data.Data.images.small}" alt="">
                            </div>
                            <div class="attraction-info">
                                <p id="title">${data.queueData.attractionName}</p>
                                <p id="description">${queueText}</p>
                                ${timeHtml}
                            </div>
                        </div>
                    </div>`;
                    
                    $(".attraction-holder").append(elementHTML);
                });
            }).catch(function(err) {
                $("#loading").remove();
                console.error("Fel vid sortering/rendering:", err);
            });

        } catch (err) {
            $("#loading").remove();
            console.error("Kunde inte hämta attraktioner:", err);
            $(".attraction-holder").append('<p>Ett fel uppstod vid hämtning av data.</p>');
        }
    });
    </script>
</body>
</html>
