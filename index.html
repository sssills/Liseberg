<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LQueue</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://kit.fontawesome.com/de4851ac23.js" crossorigin="anonymous"></script>
    <style>
        /* Din ursprungliga CSS */
        html, body {
            background-color: #0F0F0F;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            height: 100%;
        }

        nav {
            height: 30px;
            background-color: #131313;
        }

        p {
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            color: rgb(212, 212, 212);
            margin-bottom: 0px;
        }
        .title {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: rgb(212, 212, 212);
            position: relative;
            top: 5px;
            left: 7px;
        }

        .notice {
            font-family: 'Courier New', Courier, monospace;
            color: rgb(212, 212, 212);
            text-align: center;
            margin: 10px 10px 0px 10px;
        }

        .info-box {
            width: 90px;
            height: 90px;
            background-color: #0F0F0F;
            border: 1px solid rgb(36, 36, 36);
            border-radius: 4px;

            display: flex;
            justify-content: center;
            flex-direction: column;
        }

        .person-box {
            width: 40px;
            height: 40px;
            background-color: #0F0F0F;
            border: 1px solid rgb(36, 36, 36);
            border-radius: 4px;

            display: flex;
            justify-content: center;
            flex-direction: column;
            align-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .parent {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
        }

        .person-container {
            display: flex;
            justify-content: center;
            gap: 5px;
            position: relative;
            top: 10px;
        }

        .info-icon {
            position: relative;
            top: 10px;
            color: rgb(197, 197, 197);
            text-align: center;
        }

        .info-lbl {
            color: rgb(197, 197, 197);
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            top: 3px;
        }

        .glow {
            -webkit-box-shadow:0px 0px 105px 18px rgba(45,255,196,0.34);
            -moz-box-shadow: 0px 0px 105px 18px rgba(45,255,196,0.34);
            box-shadow: 0px 0px 75px 12px rgba(45,255,196,0.34);
            background-color: rgba(45,255,196,0.34);
        }

        .attraction-box {
            width: calc(100% - 40px);
            height: 90px;
            position: relative;
            top: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            background-color: rgb(17, 17, 17);
            border: 1px solid rgb(36, 36, 36);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .attraction-img {
            height: 80px;
            border-radius: 4px;
            position: relative;
            top: 4px;
            left: 4px;
            border: 1px solid rgb(36, 36, 36);
        }

        .attraction-info {
            width: 100%;
        }

        .attraction-info p {
            text-align: left;
            margin: 0;
        }
        .attraction-info #title {
            margin-top: 7px;
            margin-left: 15px;
            font-weight: 700;
        }
        .attraction-info #description {
            margin-top: 2px;
            margin-left: 15px;
            font-weight: 200;
            font-size: 12px;
            color: rgb(196, 196, 196);
        }
        .attraction-info #time {
            margin-top: 5px;
            margin-left: 15px;
            font-weight: 700;
            font-size: 32px;
            color: rgb(202, 202, 202);
        }

        .attraction-holder {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 50px;
        }

        .custom-btn {
            width: 100px;
            height: 30px;
            border: 1px solid rgb(36, 36, 36);

            display: block;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            border-radius: 4px;
            
            background-color: rgb(17, 17, 17);
            cursor: pointer;
        }

        .custom-btn p {
            margin: 0;
            margin-top: 6px;
        }

        /* Version-badge anpassad för mörkt tema */
        .version-badge {
            position: fixed;
            top: 5px;
            right: 10px;
            background-color: #131313;
            color: rgb(212, 212, 212);
            border: 1px solid rgb(36, 36, 36);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            z-index: 1000;
        }

        /* Centrerar laddningstexten */
        #loading {
            text-align: center;
            color: rgb(212, 212, 212);
            font-family: 'Courier New', Courier, monospace;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <!-- Version-badge -->
    <div class="version-badge">v2</div>

    <nav>
        <p class="title">LQueue</p>
    </nav>
    <p style="font-size: 14px;" class="notice">This project is maintained by Realtyghu. <br> <span style="font-size: 12px;">Only for educational purposes.</span></p>
    <div class="parent">
        <div class="info-box">
            <i class="fa-solid fa-cloud-sun fa-3x info-icon"></i>
            <p class="info-lbl">+21°C</p>
        </div>
        <div class="info-box">
            <i class="fa-solid fa-clock fa-3x info-icon"></i>
            <p class="info-lbl">13-22</p>
        </div>
    </div>
    <p>How many people are in queue?</p>
    <div class="person-container">
        <div class="person-box glow">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
        <div class="person-box">
            <i class="fa-solid fa-person" style="color: rgb(224, 224, 224);"></i>
        </div>
    </div>
    <div class="custom-btn">
        <p>Search</p>
    </div>
    <div class="attraction-holder"></div>
    
    <script>
    const personBoxes = Array.from(document.querySelectorAll(".person-box"));
    let queueSize = 1;

    // Hantera val av antal personer
    personBoxes.forEach((box, index) => {
        box.onclick = function() {
            queueSize = index + 1;
            personBoxes.forEach(b => b.classList.remove("glow"));
            for (let i = 0; i <= index; i++) {
                personBoxes[i].classList.add("glow");
            }
            console.log("Antal personer valda:", queueSize);
        };
    });

    // Tidshanterare
    function formatTime(dateStr) {
        if (!dateStr) return null;
        const date = new Date(dateStr);
        const adjustedDate = new Date(date.getTime() + 7200000); 
        return `${String(adjustedDate.getUTCHours()).padStart(2,"0")}:${String(adjustedDate.getUTCMinutes()).padStart(2,"0")}:${String(adjustedDate.getUTCSeconds()).padStart(2,"0")}`;
    }

    function getRemainingTime(timeStr) {
        const [h, m] = timeStr.split(":").map(Number);
        const now = new Date();
        let target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
        let diff = target - now;
        if (diff < 0) diff += 86400000;
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        return hours < 1 ? `${mins}min` : `${hours}h ${mins}min`;
    }

    function getMinutesSince(timeStr) {
        const [h, m, s] = timeStr.split(":").map(Number);
        const now = new Date();
        const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, s);
        return Math.floor((now - target) / 60000);
    }

    // Sök-knappen
    $(".custom-btn").click(async function() {
        $(".attraction-holder").empty();
        $(".attraction-holder").append('<p id="loading">Hämtar data från Liseberg...</p>');

        // Proxy för att undvika CORS-fel i webbläsaren
        const proxy = "https://corsproxy.io/?url=";
        const attractionsUrl = proxy + encodeURIComponent("https://www.liseberg.se/sv/api/app/attractions");
        const vqListUrl = proxy + encodeURIComponent("https://virtualqueue.liseberg.se/Queue/");

        try {
            // Hämta både attraktioner och den fullständiga listan för virtuella köer parallellt
            const [attractions, vqList] = await Promise.all([
                $.getJSON(attractionsUrl),
                $.getJSON(vqListUrl)
            ]);

            $("#loading").remove();

            // Skapa en lookup för attraktioner där vi matchar på namn istället för virtualQueueId
            const attractionsMap = {};
            attractions.forEach(attr => {
                attractionsMap[attr.title.toLowerCase()] = attr;
            });

            let combinedData = [];

            // Gå igenom alla virtuella köer vi fick från /Queue/
            vqList.forEach(vq => {
                // Försök hitta matchande attraktion (Liseberg skickar ibland med specialtecken)
                let matchedAttraction = attractionsMap[vq.attractionName.toLowerCase()];
                
                // Specialfall för "Ahlgrens bilar-gondolen" som matchar "Radiobilarna"
                if (!matchedAttraction && vq.attractionName.includes("Ahlgrens bilar")) {
                    matchedAttraction = attractionsMap["radiobilarna"];
                }

                let vqTime = null;
                // Kolla om estimatedTimes existerar för valt antal personer
                if (vq.estimatedTimes && vq.estimatedTimes[queueSize - 1]) {
                    vqTime = formatTime(vq.estimatedTimes[queueSize - 1].time);
                }

                combinedData.push({
                    Time: vqTime,
                    queueData: vq,
                    Data: matchedAttraction // Kan vara undefined, hanteras nedan
                });
            });

            // Sortera efter tid
            combinedData.sort((a, b) => {
                let timeA = a.Time || "99:99:99";
                let timeB = b.Time || "99:99:99";
                return timeA.localeCompare(timeB);
            });

            if (combinedData.length === 0) {
                $(".attraction-holder").append('<p id="loading">Inga virtuella köer hittades.</p>');
            }

            // Rendera ut allt
            combinedData.forEach(data => {
                let timeStr = data.Time;
                let timeHtml = '';

                if (!timeStr) {
                    timeHtml = `<p style="color: gray; font-size: 20px;" id="time">${data.queueData.status || 'VQ Closed'}</p>`;
                } else if (getMinutesSince(timeStr) >= 0) {
                    timeHtml = '<p style="color: rgb(80, 189, 76);" id="time">Now!</p>';
                } else {
                    timeHtml = '<p id="time">' + getRemainingTime(timeStr) + '</p>';
                }

                let image = "https://via.placeholder.com/80";
                let queueText = 'Physical queue: N/A';

                // Om vi hittade matchande attraktionsdata, använd den
                if (data.Data) {
                    image = data.Data.images.small;
                    let minWait = data.Data.state.minWaitTime;
                    let maxWait = data.Data.state.maxWaitTime;
                    if (minWait === -1 || maxWait === -1 || !data.Data.state.isOpen) {
                        queueText = 'Physical queue: Closed';
                    } else {
                        queueText = `Physical queue: ${minWait}-${maxWait} min`;
                    }
                }

                let elementHTML = `
                <div class="attraction-box">
                    <div style="display: flex; flex-direction: row;">
                        <div>
                            <img class="attraction-img" src="${image}" alt="">
                        </div>
                        <div class="attraction-info">
                            <p id="title">${data.queueData.attractionName}</p>
                            <p id="description">${queueText}</p>
                            ${timeHtml}
                        </div>
                    </div>
                </div>`;
                
                $(".attraction-holder").append(elementHTML);
            });

        } catch (err) {
            $("#loading").remove();
            console.error("Fel vid hämtning:", err);
            $(".attraction-holder").append('<p id="loading">Ett fel uppstod vid hämtning av data.</p>');
        }
    });
    </script>
</body>
</html>
